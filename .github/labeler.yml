# Labeler configuration for automatic PR labeling
# See: https://github.com/actions/labeler

# Documentation changes
documentation:
    - changed-files:
          - any-glob-to-any-file:
                - "docs/**/*"
                - "*.md"
                - "**/*.md"

# Source code changes
source:
    - changed-files:
          - any-glob-to-any-file:
                - "src/**/*"

# Extension changes
extensions:
    - changed-files:
          - any-glob-to-any-file:
                - "extensions/**/*"

# App changes
apps:
    - changed-files:
          - any-glob-to-any-file:
                - "apps/**/*"

# iOS app
ios:
    - changed-files:
          - any-glob-to-any-file:
                - "apps/ios/**/*"

# Android app
android:
    - changed-files:
          - any-glob-to-any-file:
                - "apps/android/**/*"

# macOS app
macos:
    - changed-files:
          - any-glob-to-any-file:
                - "apps/macos/**/*"

# UI changes
ui:
    - changed-files:
          - any-glob-to-any-file:
                - "ui/**/*"

# Test changes
tests:
    - changed-files:
          - any-glob-to-any-file:
                - "**/*.test.ts"
                - "test/**/*"
                - "vitest.*.ts"

# CI/CD changes
ci:
    - changed-files:
          - any-glob-to-any-file:
                - ".github/**/*"

# Configuration changes
config:
    - changed-files:
          - any-glob-to-any-file:
                - "*.json"
                - "*.yml"
                - "*.yaml"
                - "*.toml"
                - "tsconfig*.json"

# Dependencies
dependencies:
    - changed-files:
          - any-glob-to-any-file:
                - "package.json"
                - "pnpm-lock.yaml"
                - "pnpm-workspace.yaml"

# Scripts
scripts:
    - changed-files:
          - any-glob-to-any-file:
                - "scripts/**/*"

# Channel: Telegram
channel/telegram:
    - changed-files:
          - any-glob-to-any-file:
                - "extensions/telegram/**/*"
                - "src/telegram/**/*"

# Channel: Discord
channel/discord:
    - changed-files:
          - any-glob-to-any-file:
                - "extensions/discord/**/*"
                - "src/discord/**/*"

# Channel: Slack
channel/slack:
    - changed-files:
          - any-glob-to-any-file:
                - "extensions/slack/**/*"
                - "src/slack/**/*"

# Channel: WhatsApp
channel/whatsapp:
    - changed-files:
          - any-glob-to-any-file:
                - "extensions/whatsapp/**/*"
                - "src/whatsapp/**/*"

# Channel: Signal
channel/signal:
    - changed-files:
          - any-glob-to-any-file:
                - "extensions/signal/**/*"
                - "src/signal/**/*"
